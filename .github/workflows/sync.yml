name: Daily Garmin Sync

# DEPRECATED as scheduled job: Garmin blocks GitHub Actions' datacenter IPs
# (429 on fresh SSO login, empty response on oauth2 refresh). The daily sync now
# runs locally on the Mac via launchd (residential IP) — see scripts/sync_local.sh
# and com.garmincoach.sync.plist. Kept for manual dispatch / reference only.
on:
  workflow_dispatch:        # manual only

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    # secrets can't be used in step `if:` directly — map to env for the guards.
    # Athletes run only when their cached token secret exists. Token-login avoids
    # Garmin's 429 rate-limit on fresh SSO logins from datacenter IPs.
    env:
      HAS_ROWAN: ${{ secrets.GARMIN_TOKENS_ROWAN != '' }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      # --- Athlete 1: vriendin ---
      - name: Restore Garmin tokens (vriendin)
        env:
          TOKENS: ${{ secrets.GARMIN_TOKENS_VRIENDIN }}
        run: |
          mkdir -p .garmin_tokens/vriendin
          echo "$TOKENS" | base64 -d | tar -xz -C .garmin_tokens/vriendin

      - name: Pull Garmin data (vriendin)
        env:
          GARMIN_EMAIL: ${{ secrets.GARMIN_EMAIL }}
          GARMIN_PASSWORD: ${{ secrets.GARMIN_PASSWORD }}
        run: python garmin_test_pull.py --athlete vriendin

      - name: Ingest to Supabase (vriendin)
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python ingest.py --athlete vriendin --name Vriendin

      # --- Athlete 2: rowan (runs only once GARMIN_TOKENS_ROWAN secret is set) ---
      - name: Restore Garmin tokens (rowan)
        if: ${{ env.HAS_ROWAN == 'true' }}
        env:
          TOKENS: ${{ secrets.GARMIN_TOKENS_ROWAN }}
        run: |
          mkdir -p .garmin_tokens/rowan
          echo "$TOKENS" | base64 -d | tar -xz -C .garmin_tokens/rowan

      - name: Pull Garmin data (rowan)
        if: ${{ env.HAS_ROWAN == 'true' }}
        env:
          GARMIN_EMAIL: ${{ secrets.GARMIN_EMAIL_ROWAN }}
          GARMIN_PASSWORD: ${{ secrets.GARMIN_PASSWORD_ROWAN }}
        run: python garmin_test_pull.py --athlete rowan

      - name: Ingest to Supabase (rowan)
        if: ${{ env.HAS_ROWAN == 'true' }}
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python ingest.py --athlete rowan --name Rowan
